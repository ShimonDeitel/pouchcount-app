name: Pouchcount
options:
  bundleIdPrefix: com.shimondeitel.treatcal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Pouchcount:
    type: application
    platform: iOS
    sources:
      - path: Pouchcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.treatcal
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Pouchcount/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PouchcountTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PouchcountTests
      - path: Pouchcount.storekit
    dependencies:
      - target: Pouchcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.treatcal.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PouchcountUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PouchcountUITests
    dependencies:
      - target: Pouchcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.treatcal.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Pouchcount:
    build:
      targets:
        Pouchcount: all
        PouchcountTests: [test]
        PouchcountUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Pouchcount.storekit
    test:
      config: Debug
      storeKitConfiguration: Pouchcount.storekit
      targets:
        - PouchcountTests
        - PouchcountUITests
    archive:
      config: Release
